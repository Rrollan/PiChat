name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'windows-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: "windows version"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "windows version/package-lock.json"

      - name: Setup .NET for native host
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Build native host
        run: npm run build:native-host

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows artifacts
        run: npm run dist

      - name: Create unpacked zip
        shell: pwsh
        run: Compress-Archive -Path release/win-unpacked -DestinationPath release/PiChat-Windows-Unpacked-1.0.1-x64.zip -Force

      - name: Checksums
        shell: pwsh
        run: |
          $files = @(
            'release/PiChat-Windows-Setup-1.0.1-x64.exe',
            'release/PiChat-Windows-Portable-1.0.1-x64.exe',
            'release/PiChat-Windows-Unpacked-1.0.1-x64.zip',
            'release/PiChat-Windows-Setup-1.0.1-x64.exe.blockmap'
          )
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $(Split-Path $file -Leaf)"
          }
          $lines | Set-Content release/SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pichat-windows-release
          path: |
            windows version/release/PiChat-Windows-Setup-1.0.1-x64.exe
            windows version/release/PiChat-Windows-Portable-1.0.1-x64.exe
            windows version/release/PiChat-Windows-Unpacked-1.0.1-x64.zip
            windows version/release/PiChat-Windows-Setup-1.0.1-x64.exe.blockmap
            windows version/release/SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/windows-v')
        uses: softprops/action-gh-release@v2
        with:
          name: PiChat Windows ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES_WINDOWS_v1.0.1.md
          make_latest: false
          files: |
            windows version/release/PiChat-Windows-Setup-1.0.1-x64.exe
            windows version/release/PiChat-Windows-Portable-1.0.1-x64.exe
            windows version/release/PiChat-Windows-Unpacked-1.0.1-x64.zip
            windows version/release/PiChat-Windows-Setup-1.0.1-x64.exe.blockmap
            windows version/release/SHA256SUMS.txt
