name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'windows-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: "windows version"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "windows version/package-lock.json"

      - name: Setup .NET for native host
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $tagVersion = "${{ github.ref_name }}" -replace '^windows-', ''
          if ($tagVersion -and $tagVersion -ne $version -and $tagVersion -ne "${{ github.ref_name }}") {
            if ($tagVersion.TrimStart('v') -ne $version) {
              throw "Tag ${{ github.ref_name }} does not match package version $version"
            }
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "notes=docs/RELEASE_NOTES_WINDOWS_v$version.md" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build native host
        run: npm run build:native-host

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installer
        run: npm run dist

      - name: Verify installer artifact
        shell: pwsh
        run: |
          $installer = "release/PiChat-Windows-Setup-${{ steps.meta.outputs.version }}-x64.exe"
          if (-not (Test-Path $installer)) { throw "Installer not found: $installer" }
          Write-Host "Windows release artifact: $installer"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pichat-windows-installer
          path: windows version/release/PiChat-Windows-Setup-${{ steps.meta.outputs.version }}-x64.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/windows-v')
        uses: softprops/action-gh-release@v2
        with:
          name: PiChat Windows v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes }}
          make_latest: false
          files: windows version/release/PiChat-Windows-Setup-${{ steps.meta.outputs.version }}-x64.exe
